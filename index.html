<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father's Day Card</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card" id="card">

            <!-- Front of Card -->
            <div class="card-front">
                <div class="front-text">Happy Father's Day!</div>
                <div class="click-hint">Click to open</div>
            </div>

            <!-- Back of Card -->
            <div class="card-back">
                <div class="card-title">💙 A Special Day for Dad 💙</div>

                <div class="celebration">🎉</div>

                <div class="photos-section" id="photosSection">
                    <div class="photo-placeholder">
                        <img src="Me1.jpg" alt="Photo 1">
                    </div>
                    <div class="photo-placeholder photo-center">
                        <img src="Dad.png" alt="Dad">
                    </div>
                    <div class="photo-placeholder">
                        <img src="Me2.jpg" alt="Photo 3">
                    </div>
                </div>

                <div class="message" id="customMessage">
                    Thank you for being the best and Hard working dad in the world. I love you so much and I hope you have a wonderful Father's Day filled with love, laughter, and happiness. You deserve all the joy in the world!
                </div>

                <div class="signature">- Your Loving Child</div>
            </div>

        </div>
    </div>
</body>
</html>
