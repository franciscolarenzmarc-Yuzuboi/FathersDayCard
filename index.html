<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father's Day Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <!-- Front of Card -->
            <div class="card-front">
                <div class="front-text">Happy Father's Day!</div>
                <div class="click-hint">Click to open</div>
            </div>

            <!-- Back of Card -->
            <div class="card-back">
                <div class="card-title">💙 A Special Day for Dad 💙</div>

                <div class="celebration">🎉</div>

                <div class="photos-section" id="photosSection">
                    <div class="photo-placeholder" onclick="addPhoto(0)" title="Click to add photo">
                        <span id="photo1">📷</span>
                    </div>
                    <div class="photo-placeholder" onclick="addPhoto(1)" title="Click to add photo">
                        <span id="photo2">📷</span>
                    </div>
                    <div class="photo-placeholder" onclick="addPhoto(2)" title="Click to add photo">
                        <span id="photo3">📷</span>
                    </div>
                </div>

                <div class="message" id="customMessage">Thank you for all the memories and love! You're the best Dad! ❤️</div>

                <input type="text" class="custom-message-input" placeholder="Add your custom message..." id="messageInput">
                <button onclick="updateMessage()">Update Message</button>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const cardContainer = document.getElementById('cardContainer');
        const messageInput = document.getElementById('messageInput');

        // Click to open/close card
        cardContainer.addEventListener('click', function() {
            card.classList.toggle('open');
        });

        // Prevent input clicks from opening/closing card
        messageInput.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // Store photos in an array
        const photos = [null, null, null];

        // Add photo function
        function addPhoto(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    photos[index] = event.target.result;
                    const photoId = `photo${index + 1}`;
                    const photoElement = document.getElementById(photoId);
                    photoElement.innerHTML = `<img src="${event.target.result}" alt="Dad photo">`;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // Update custom message
        function updateMessage() {
            const newMessage = messageInput.value.trim();
            if (newMessage) {
                document.getElementById('customMessage').textContent = newMessage;
                messageInput.value = '';
            }
        }

        // Allow Enter key to update message
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                updateMessage();
            }
        });
    </script>
</body>
</html>
